name: Metrics
on:
  # Run at 00:00 UTC every day
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual trigger via the Actions tab
  workflow_dispatch:
  # Run on every push to the main branch
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate User Metrics
        uses: lowlighter/metrics@latest
        with:
          # Required: The secret token you stored in Step 2
          token: ${{ secrets.METRICS_TOKEN }}

          # Core configuration
          user: luis-felipe
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Fortaleza # Adjusts activity timestamps to your region

          # Plugin: Programming Languages
          # Useful for displaying technical proficiency (e.g., C++, TeX, Python)
          plugin_languages: yes
          plugin_languages_ignored: html, css                          # Focus on logic-based languages
          plugin_languages_details: bytes-size, percentage             # Show precise data distribution
          
          # Plugin: Habits
          # Displays coding consistency and active hours
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Plugin: Achievements
          # Displays badges for contributions and community milestones
          plugin_achievements: yes
          plugin_achievements_threshold: B                             # Only show significant achievements